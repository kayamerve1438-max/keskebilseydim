<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesaj Kutusu - Keşke Bilseydim</title>
<link rel="stylesheet" href="header.css">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
  radial-gradient(circle at 20% 20%, rgba(0,180,255,.15), transparent 35%),
  radial-gradient(circle at 80% 30%, rgba(255,0,255,.12), transparent 35%),
  #060913;
  color:white;
}

.messages-page{
  width:92%;
  max-width:1200px;
  margin:40px auto;
}

.messages-layout{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:20px;
}

.panel{
  background:rgba(15,23,42,.88);
  border:1px solid rgba(56,189,248,.25);
  border-radius:24px;
  padding:22px;
  box-shadow:0 0 35px rgba(56,189,248,.14);
}

.title{
  font-size:30px;
  font-weight:900;
  margin-bottom:18px;
}

.conversation-item{
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(56,189,248,.15);
  margin-bottom:12px;
  cursor:pointer;
  background:rgba(15,23,42,.75);
}

.conversation-item:hover{
  border-color:#38bdf8;
}

.conversation-name{
  color:#38bdf8;
  font-weight:900;
  margin-bottom:6px;
}

.conversation-last{
  color:#cbd5e1;
  font-size:14px;
}

.chat-header{
  font-size:24px;
  font-weight:900;
  margin-bottom:18px;
  color:#38bdf8;
}

.message-bubble{
  max-width:75%;
  padding:13px 15px;
  border-radius:16px;
  margin-bottom:12px;
  background:#1e293b;
  color:white;
}

.message-bubble.mine{
  margin-left:auto;
  background:linear-gradient(135deg,#0ea5e9,#a855f7);
}

.message-quote{
  background:rgba(255,255,255,.10);
  border-left:4px solid #38bdf8;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:8px;
  font-size:13px;
  color:#e2e8f0;
}

.chat-input{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.chat-input textarea{
  flex:1;
  min-height:70px;
  border-radius:14px;
  border:1px solid rgba(56,189,248,.25);
  background:#020617;
  color:white;
  padding:12px;
  resize:vertical;
}

.chat-input button{
  border:0;
  border-radius:14px;
  padding:12px 22px;
  font-weight:900;
  color:white;
  cursor:pointer;
  background:linear-gradient(135deg,#0ea5e9,#a855f7);
}

.empty{
  color:#cbd5e1;
  padding:20px;
  text-align:center;
}
.unread-conversation{
  border-color:#38bdf8;
  background:rgba(56,189,248,.12);
}

.message-unread-dot{
  float:right;
  background:#ef4444;
  color:white;
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
}
</style>
</head>

<body>

<div id="header-container"></div>

<main class="messages-page">
  <div class="messages-layout">

    <section class="panel">
      <div class="title">Mesaj Kutusu 💬</div>
      <div id="conversationList" class="empty">Konuşmalar yükleniyor...</div>
    </section>

    <section class="panel">
      <div id="chatHeader" class="chat-header">Bir konuşma seç</div>
      <div id="chatMessages" class="empty">Mesajlarını görmek için soldan bir konuşma seç.</div>

      <div class="chat-input" id="chatInputArea" style="display:none;">
        <textarea id="replyInput" placeholder="Mesajını yaz..."></textarea>
        <button id="sendReplyBtn">Gönder</button>
      </div>
    </section>

  </div>
</main>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
  document.getElementById("header-container").innerHTML = data;
  const script = document.createElement("script");
  script.src = "header.js";
  document.body.appendChild(script);
});
</script>

<script type="module">
import { db } from "./firebase-db.js";

import {
  collection,
  getDocs,
  onSnapshot,
  query,
  where,
  doc,
  addDoc,
  getDoc,
  setDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const auth = getAuth();

const conversationList = document.getElementById("conversationList");
const chatHeader = document.getElementById("chatHeader");
const chatMessages = document.getElementById("chatMessages");
const chatInputArea = document.getElementById("chatInputArea");
const replyInput = document.getElementById("replyInput");
const sendReplyBtn = document.getElementById("sendReplyBtn");

let currentUser = null;
let conversations = [];
let activeConversation = null;
let unsubscribeConversations = null;

function safeText(text){
  return String(text || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function getOtherUser(conv){
  const otherId = conv.participants.find(id => id !== currentUser.uid);
  return {
    id: otherId,
    name: conv.participantNames?.[otherId] || "Kullanıcı"
  };
}

function loadConversations(){
  const q = query(
    collection(db, "conversations"),
    where("participants", "array-contains", currentUser.uid)
  );

  if(unsubscribeConversations){
    unsubscribeConversations();
  }

  unsubscribeConversations = onSnapshot(q, (snap) => {
    conversations = [];

    snap.forEach(docSnap => {
      conversations.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    conversations.sort((a,b)=>{
      const ad = a.updatedAt?.toMillis?.() || 0;
      const bd = b.updatedAt?.toMillis?.() || 0;
      return bd - ad;
    });

    if(conversations.length === 0){
      conversationList.innerHTML = `<div class="empty">Henüz konuşman yok. 🐾</div>`;
      return;
    }

    conversationList.innerHTML = conversations.map(conv => {
      const other = getOtherUser(conv);
      const hasUnread = conv.unreadBy && conv.unreadBy[currentUser.uid];

      return `
        <div class="conversation-item ${hasUnread ? "unread-conversation" : ""}" data-id="${conv.id}">
          <div class="conversation-name">
            ${safeText(other.name)}
            ${hasUnread ? `<span class="message-unread-dot">Yeni</span>` : ""}
          </div>
          <div class="conversation-last">${safeText(conv.lastMessage || "")}</div>
        </div>
      `;
    }).join("");
  });
}

async function openConversation(conversationId){
  activeConversation = conversations.find(c => c.id === conversationId);

  if(!activeConversation) return;
  await updateDoc(doc(db, "conversations", conversationId), {
  [`unreadBy.${currentUser.uid}`]: false
});

activeConversation.unreadBy = {
  ...(activeConversation.unreadBy || {}),
  [currentUser.uid]: false
};

await loadConversations();

  const other = getOtherUser(activeConversation);
  chatHeader.textContent = other.name;
  chatInputArea.style.display = "flex";

  const msgSnap = await getDocs(collection(db, "conversations", conversationId, "messages"));

  const msgs = [];

  msgSnap.forEach(docSnap => {
    msgs.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  msgs.sort((a,b)=>{
    const ad = a.createdAt?.toMillis?.() || 0;
    const bd = b.createdAt?.toMillis?.() || 0;
    return ad - bd;
  });

  chatMessages.innerHTML = msgs.map(msg => `
    <div class="message-bubble ${msg.fromUserId === currentUser.uid ? "mine" : ""}">
      ${msg.quotedCommentText ? `
        <div class="message-quote">
          ${safeText(msg.quotedCommentText)}
        </div>
      ` : ""}
      ${safeText(msg.message)}
    </div>
  `).join("");
}

conversationList.addEventListener("click", function(e){
  const item = e.target.closest(".conversation-item");
  if(!item) return;
  openConversation(item.dataset.id);
});

sendReplyBtn.addEventListener("click", async function(){
  if(!activeConversation) return;

  const text = replyInput.value.trim();

  if(!text){
    alert("Mesaj yazmadan gönderemezsin.");
    return;
  }

  const other = getOtherUser(activeConversation);

  await addDoc(collection(db, "conversations", activeConversation.id, "messages"), {
    fromUserId: currentUser.uid,
    fromUserName: currentUser.displayName || currentUser.email || "Kullanıcı",
    toUserId: other.id,
    toUserName: other.name,
    message:text,
    quotedCommentText:"",
    createdAt: serverTimestamp(),
    isRead:false
  });

  await setDoc(doc(db, "conversations", activeConversation.id), {
    lastMessage:text,
    lastMessageFrom:currentUser.uid,
    unreadBy:{
        [other.id]: true,
        [currentUser.uid]: false
    },
    updatedAt:serverTimestamp()
}, { merge:true });

  replyInput.value = "";
  await loadConversations();
  await openConversation(activeConversation.id);
});

onAuthStateChanged(auth, async (user) => {
  if(!user){
    conversationList.innerHTML = `<div class="empty">Mesaj kutusunu görmek için giriş yapmalısın. 🐾</div>`;
    return;
  }

  currentUser = user;
loadConversations();
});
replyInput?.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendReplyBtn?.click();
    }
});
</script>
<script src="keyboard.js"></script>
</body>
</html>
