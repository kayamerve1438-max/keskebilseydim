<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildirimler - Keşke Bilseydim</title>

<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="profile.css">
<link rel="stylesheet" href="responsive.css?v=1">
<link rel="stylesheet" href="responsive-pages.css?v=1">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef1f8;
    color:#101828;
}

.page{
    width:92%;
    max-width:1300px;
    margin:30px auto;
    background:white;
    border-radius:18px;
    box-shadow:0 18px 45px rgba(0,0,0,.10);
    overflow:hidden;
}

.notifications-head{
    padding:28px 34px;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.notifications-head h1{
    margin:0;
    font-size:32px;
}

.mark-read{
    border:0;
    background:#2563eb;
    color:white;
    border-radius:12px;
    padding:12px 18px;
    font-weight:800;
    cursor:pointer;
}

.notification-list{
    width:100%;
}

.notification-item{
    display:grid;
    grid-template-columns:150px 1fr 110px;
    gap:20px;
    align-items:center;
    padding:18px 34px;
    border-bottom:1px solid #eef0f5;
    text-decoration:none;
    color:#101828;
}

.notification-item:hover{
    background:#f8fafc;
}

.notification-type{
    font-weight:900;
    color:#2563eb;
}

.notification-type.comment{
    color:#16a34a;
}

.notification-text{
    font-size:15px;
    line-height:1.45;
}

.notification-text b{
    font-weight:900;
}

.notification-date{
    text-align:right;
    color:#667085;
    font-size:14px;
}

.notification-item.unread{
    background:#f0f6ff;
}

.notification-item.unread .notification-text:before{
    content:"";
    display:inline-block;
    width:9px;
    height:9px;
    background:#2563eb;
    border-radius:50%;
    margin-right:8px;
}

@media(max-width:700px){
    .notification-item{
        grid-template-columns:1fr;
        gap:8px;
    }
    .notification-date{
        text-align:left;
    }
}
</style>
</head>

<body>

<div id="header-container"></div>
<div id="auth-container"></div>

<div class="page">
    <div class="notifications-head">
        <h1>Bildirimler</h1>
        <button class="mark-read" id="markAllRead">Tümünü okundu yap</button>
    </div>

    <div class="notification-list" id="notificationList"></div>
</div>

<div id="footer-container"></div>
<script type="module">
import { db } from "./firebase-db.js";

import {
  collection,
  getDocs,
  query,
  where,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const auth = getAuth();
const list = document.getElementById("notificationList");
const markAllReadBtn = document.getElementById("markAllRead");

let currentUser = null;
let currentNotifications = [];

function safeText(text){
    return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function formatDate(value){
    if(!value) return "";

    try{
        const date = value.toDate ? value.toDate() : new Date(value);
        return date.toLocaleString("tr-TR");
    }catch(e){
        return "";
    }
}

function getNotificationIcon(type){
    if(type === "message") return "💬 Mesaj";
    if(type === "like") return "❤️ Beğeni";
    if(type === "comment") return "💭 Yorum";
    if(type === "quote") return "↩️ Alıntı";
    return "🔔 Bildirim";
}

function renderNotifications(){
    if(currentNotifications.length === 0){
        list.innerHTML = `
            <div class="notification-item">
                <div class="notification-type">🐾 Bilge Kedi</div>
                <div class="notification-text">Henüz bildirimin yok, insan dostum.</div>
                <div class="notification-date"></div>
            </div>
        `;
        return;
    }

    list.innerHTML = currentNotifications.map(item => `
        <a 
          class="notification-item ${item.isRead ? "" : "unread"}"
          href="${safeText(item.link || "#")}"
          data-id="${item.id}">
            <div class="notification-type ${safeText(item.type || "")}">
                ${getNotificationIcon(item.type)}
            </div>

            <div class="notification-text">
                <b>${safeText(item.title || "Bildirim")}</b><br>
                ${safeText(item.text || "")}
            </div>

            <div class="notification-date">
                ${formatDate(item.createdAt)}
            </div>
        </a>
    `).join("");
}

async function loadNotifications(){
    const q = query(
    collection(db, "notifications"),
    where("toUserId", "==", currentUser.uid)
);

    const snap = await getDocs(q);

    currentNotifications = [];

    snap.forEach(docSnap => {
    const data = docSnap.data();

    if(data.type !== "message"){
        currentNotifications.push({
            id: docSnap.id,
            ...data
        });
    }
});
currentNotifications.sort((a,b)=>{
    const ad = a.createdAt?.toMillis?.() || 0;
    const bd = b.createdAt?.toMillis?.() || 0;
    return bd - ad;
});
    renderNotifications();
}

list.addEventListener("click", async function(e){
    const item = e.target.closest(".notification-item");
    if(!item) return;

    e.preventDefault();

    const id = item.dataset.id;
    const href = item.getAttribute("href");

    if(id){
        await updateDoc(doc(db, "notifications", id), {
            isRead:true
        });
    }

    if(href && href !== "#"){
        window.location.href = href;
    }else{
        await loadNotifications();
    }
});

markAllReadBtn.onclick = async function(){
    if(!currentNotifications.length) return;

    const unread = currentNotifications.filter(item => !item.isRead);

    await Promise.all(
        unread.map(item =>
            updateDoc(doc(db, "notifications", item.id), {
                isRead:true
            })
        )
    );

    currentNotifications = currentNotifications.map(item => ({
        ...item,
        isRead:true
    }));

    renderNotifications();
};

onAuthStateChanged(auth, async (user) => {
    if(!user){
        list.innerHTML = `
            <div class="notification-item">
                <div class="notification-type">🐾 Bilge Kedi</div>
                <div class="notification-text">Bildirimlerini görmek için giriş yapmalısın.</div>
                <div class="notification-date"></div>
            </div>
        `;
        return;
    }

    currentUser = user;
    await loadNotifications();
});
</script>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;

    const headerScript = document.createElement("script");
    headerScript.src = "header.js";
    document.body.appendChild(headerScript);
  });

fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-container").innerHTML = data;
  });
</script>
<script src="keyboard.js"></script>
</body>
</html>
