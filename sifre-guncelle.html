<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Güncelle - Keşke Bilseydim</title>

<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="profile.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef1f8;
    color:#101828;
}

.password-page{
    width:92%;
    max-width:560px;
    margin:60px auto;
    background:white;
    padding:34px;
    border-radius:18px;
    box-shadow:0 18px 45px rgba(0,0,0,.10);
}

.password-page h1{
    margin:0 0 10px;
    font-size:30px;
}

.password-page p{
    color:#667085;
    margin-bottom:28px;
}

.password-page input{
    width:100%;
    height:50px;
    border:1px solid #d8dde6;
    border-radius:10px;
    padding:0 14px;
    margin-bottom:14px;
    font-size:15px;
}

.password-page button{
    width:100%;
    height:50px;
    background:#2563eb;
    color:white;
    border:0;
    border-radius:12px;
    font-weight:900;
    cursor:pointer;
}

.message{
    margin-top:14px;
    font-weight:800;
    text-align:center;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div id="header-container"></div>
<div id="auth-container"></div>

<main class="password-page">
    <h1>Şifre Güncelle</h1>
    <p>Önce mevcut şifreni doğrula. Sonra yeni şifreni belirle.</p>

    <input id="currentPassword" type="password" placeholder="Mevcut şifre">

    <div id="newPasswordArea" class="hidden">
        <input id="newPassword" type="password" placeholder="Yeni şifre">
        <input id="newPasswordAgain" type="password" placeholder="Yeni şifre tekrar">
    </div>

    <button id="passwordActionBtn">Mevcut Şifreyi Kontrol Et</button>

    <div id="passwordMessage" class="message"></div>
</main>

<div id="footer-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  EmailAuthProvider,
  reauthenticateWithCredential,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfWhRF8BpXTxXlE5Hzs45FDuoocWy9H9E",
  authDomain: "keskebilseydim-f56dc.firebaseapp.com",
  projectId: "keskebilseydim-f56dc",
  storageBucket: "keskebilseydim-f56dc.firebasestorage.app",
  messagingSenderId: "524443729178",
  appId: "1:524443729178:web:abc85bbcbcf65a3075c0a3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const currentPassword = document.getElementById("currentPassword");
const newPasswordArea = document.getElementById("newPasswordArea");
const newPassword = document.getElementById("newPassword");
const newPasswordAgain = document.getElementById("newPasswordAgain");
const btn = document.getElementById("passwordActionBtn");
const msg = document.getElementById("passwordMessage");

let verified = false;

btn.onclick = async function(){

    const user = auth.currentUser;

    if(!user || !user.email){
        msg.textContent = "Şifre güncellemek için önce giriş yapmalısın.";
        msg.style.color = "red";
        return;
    }

    if(!verified){
        const oldPass = currentPassword.value.trim();

        if(!oldPass){
            msg.textContent = "Mevcut şifreni gir.";
            msg.style.color = "red";
            return;
        }

        try{
            const credential = EmailAuthProvider.credential(user.email, oldPass);
            await reauthenticateWithCredential(user, credential);

            verified = true;
            currentPassword.disabled = true;
            newPasswordArea.classList.remove("hidden");
            btn.textContent = "Yeni Şifreyi Kaydet";
            msg.textContent = "Mevcut şifre doğrulandı.";
            msg.style.color = "green";

        }catch(error){
            msg.textContent = "Mevcut şifre hatalı.";
            msg.style.color = "red";
        }

        return;
    }

    const pass1 = newPassword.value.trim();
    const pass2 = newPasswordAgain.value.trim();

    if(!pass1 || !pass2){
        msg.textContent = "Yeni şifre alanlarını doldur.";
        msg.style.color = "red";
        return;
    }

    if(pass1.length < 6){
        msg.textContent = "Yeni şifre en az 6 karakter olmalı.";
        msg.style.color = "red";
        return;
    }

    if(pass1 !== pass2){
        msg.textContent = "Yeni şifreler aynı değil.";
        msg.style.color = "red";
        return;
    }

    try{
        await updatePassword(auth.currentUser, pass1);

        msg.textContent = "Şifren başarıyla güncellendi.";
        msg.style.color = "green";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1200);

    }catch(error){
        msg.textContent = "Şifre güncellenemedi. Lütfen tekrar giriş yap.";
        msg.style.color = "red";
    }
};
</script>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;

    const headerScript = document.createElement("script");
    headerScript.src = "header.js";
    document.body.appendChild(headerScript);
  });

fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-container").innerHTML = data;
  });
</script>

</body>
</html>
