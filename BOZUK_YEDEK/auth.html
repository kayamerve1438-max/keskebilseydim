<div class="auth-modal" id="authModal">
    <div class="auth-box">
        <button class="auth-close" id="authClose">×</button>

        <h2>Giriş Yap</h2>

        <p class="auth-register-text">
            <span id="authSwitchText">Hesabın yok mu?</span>
            <button id="switchAuthMode">Hemen oluştur</button>
        </p>

        <input id="authName" class="auth-name-field" type="text" placeholder="Ad Soyad">
        <input id="authEmail" type="email" placeholder="E-posta Adresi veya Kullanıcı Adı">

        <div class="password-wrap">
            <input id="authPassword" type="password" placeholder="Şifre">
            <span class="eye">👁</span>
        </div>

        <button id="loginBtn" class="auth-main-btn">Giriş Yap</button>

        <a id="forgotPassword" class="forgot-pass">Şifremi Unuttum</a>

        <div class="or-line">
            <span></span>
            <b>VEYA</b>
            <span></span>
        </div>

        <button id="googleLogin" class="social-btn">Google ile Giriş Yap</button>

        <p class="auth-legal">
            Kişisel verileriniz, Gizlilik Politikası ve Kullanıcı Sözleşmesi kapsamında işlenmektedir.
        </p>

        <p id="authMessage" class="auth-message"></p>
    </div>
</div>
